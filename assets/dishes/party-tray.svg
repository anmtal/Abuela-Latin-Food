<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Catering party tray illustration">
  <ellipse cx="100" cy="112" rx="92" ry="60" fill="#000" opacity="0.06"/>
  <!-- tray -->
  <ellipse cx="100" cy="106" rx="90" ry="58" fill="#C0C6CC"/>
  <ellipse cx="100" cy="102" rx="90" ry="58" fill="#E6EAEE"/>
  <ellipse cx="100" cy="102" rx="78" ry="48" fill="#F7EEDD"/>
  <ellipse cx="100" cy="102" rx="78" ry="48" fill="none" stroke="#E4D7BB" stroke-width="2"/>
  <!-- three sections of food -->
  <g>
    <!-- rice -->
    <path d="M40 102 a40 26 0 0 1 40 -24 l0 48 a40 26 0 0 1 -40 -24 z" fill="#FBF4E3"/>
    <g fill="#F1E6C9" stroke="#E7D9BC" stroke-width="0.8">
      <ellipse cx="52" cy="94" rx="5" ry="2.6" transform="rotate(20 52 94)"/>
      <ellipse cx="60" cy="102" rx="5" ry="2.6" transform="rotate(-15 60 102)"/>
      <ellipse cx="50" cy="110" rx="5" ry="2.6" transform="rotate(30 50 110)"/>
      <ellipse cx="64" cy="90" rx="5" ry="2.6"/>
    </g>
    <!-- pulled pork center -->
    <path d="M80 78 a40 26 0 0 1 40 0 l0 48 a40 26 0 0 1 -40 0 z" fill="#8A4A22"/>
    <g stroke="#B5763F" stroke-width="2.6" stroke-linecap="round" fill="none">
      <path d="M84 90 q16 -6 32 0"/><path d="M82 100 q18 -4 36 0"/><path d="M86 110 q14 6 28 0"/><path d="M84 118 q16 4 32 0"/>
    </g>
    <!-- beans/veg -->
    <path d="M120 78 a40 26 0 0 1 40 24 a40 26 0 0 1 -40 24 z" fill="#5E7A2E"/>
    <g fill="#3E5420"><ellipse cx="134" cy="94" rx="4" ry="2.6"/><ellipse cx="142" cy="102" rx="4" ry="2.6"/><ellipse cx="132" cy="110" rx="4" ry="2.6"/><ellipse cx="146" cy="90" rx="4" ry="2.6"/></g>
    <g fill="#C43A22"><circle cx="138" cy="100" r="3"/><circle cx="130" cy="102" r="2.4"/></g>
  </g>
  <!-- steam -->
  <g stroke="#C8A97E" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5">
    <path d="M78 60 q-6 -10 0 -20"/>
    <path d="M100 56 q-6 -10 0 -20"/>
    <path d="M122 60 q6 -10 0 -20"/>
  </g>
</svg>
