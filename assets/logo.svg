<svg width="360" height="120" viewBox="0 0 360 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abuela Latin Food">
  <defs>
    <linearGradient id="potGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E9A63B"/>
      <stop offset="1" stop-color="#C4571E"/>
    </linearGradient>
  </defs>
  <!-- Emblem -->
  <g transform="translate(8,10)">
    <circle cx="50" cy="50" r="48" fill="#B23A24"/>
    <circle cx="50" cy="50" r="48" fill="none" stroke="#F7EEDD" stroke-width="2" stroke-dasharray="3 5" opacity="0.7"/>
    <!-- steam -->
    <g stroke="#F7EEDD" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85">
      <path d="M38 34 q-6 -8 0 -16"/>
      <path d="M50 32 q-6 -8 0 -16"/>
      <path d="M62 34 q6 -8 0 -16"/>
    </g>
    <!-- pot -->
    <path d="M26 46 h48 a4 4 0 0 1 4 4 v6 a28 24 0 0 1 -56 0 v-6 a4 4 0 0 1 4 -4 z" fill="url(#potGrad)"/>
    <rect x="22" y="44" width="56" height="7" rx="3.5" fill="#F7EEDD"/>
    <circle cx="20" cy="54" r="5" fill="none" stroke="#F7EEDD" stroke-width="3"/>
    <circle cx="80" cy="54" r="5" fill="none" stroke="#F7EEDD" stroke-width="3"/>
    <!-- heart -->
    <path d="M50 66 c-4 -5 -12 -4 -12 3 c0 5 7 9 12 12 c5 -3 12 -7 12 -12 c0 -7 -8 -8 -12 -3 z" fill="#F7EEDD"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(120,0)">
    <text x="0" y="52" font-family="'Fraunces','Playfair Display',serif" font-size="42" font-style="italic" font-weight="600" fill="#B23A24">Abuela</text>
    <text x="2" y="82" font-family="'Outfit','Segoe UI',sans-serif" font-size="19" font-weight="600" letter-spacing="7" fill="#3A2A20">LATIN FOOD</text>
    <text x="3" y="104" font-family="'Outfit',sans-serif" font-size="10.5" font-weight="500" letter-spacing="2.5" fill="#8a6a55">CATERING &amp; HOME COOKING</text>
  </g>
</svg>
